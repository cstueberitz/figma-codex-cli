<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f1ea;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-border: rgba(124, 103, 74, 0.14);
      --text: #1f1a17;
      --muted: #6f6258;
      --dot-idle: #b3aba3;
      --dot-connecting: #d38b1f;
      --dot-connected: #2e9a62;
      --dot-error: #d25252;
      --shadow: 0 10px 24px rgba(52, 38, 24, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171311;
        --panel: rgba(34, 28, 24, 0.94);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f6efe7;
        --muted: #b9aca1;
        --dot-idle: #5d534b;
        --dot-connecting: #f0a533;
        --dot-connected: #53c78b;
        --dot-error: #ff7b72;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "SF Pro Text", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      background:
        radial-gradient(circle at top left, rgba(232, 184, 121, 0.18), transparent 45%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.03)),
        var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      align-items: stretch;
      padding: 10px;
      overflow: hidden;
    }

    .shell {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 11px 12px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .eyebrow {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .title {
      font-weight: 650;
      font-size: 13px;
      line-height: 1.1;
    }

    .badge {
      flex-shrink: 0;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      padding: 4px 7px;
      font-size: 9px;
      line-height: 1;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 9px;
      border-radius: 10px;
      background: rgba(127, 127, 127, 0.08);
      min-height: 42px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--dot-idle);
      box-shadow: 0 0 0 4px rgba(127, 127, 127, 0.08);
    }
    .dot.connecting { background: var(--dot-connecting); animation: pulse 1s infinite; }
    .dot.connected { background: var(--dot-connected); }
    .dot.error { background: var(--dot-error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status {
      color: var(--text);
      font-weight: 560;
      line-height: 1.25;
      white-space: normal;
      word-break: break-word;
    }

    .hint {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.25;
      white-space: normal;
      word-break: break-word;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topline">
      <div>
        <div class="eyebrow">Plugin Bridge</div>
        <div class="title">Figma Codex CLI</div>
      </div>
      <div class="badge">Safe Mode</div>
    </div>

    <div class="status-row">
      <div id="dot" class="dot connecting"></div>
      <span id="status">Looking for local daemon…</span>
    </div>

    <div class="hint">Keep this panel open while Codex stays connected.</div>
  </div>

  <script>
    // Scan ports 3456-3460 in PARALLEL for fast connection
    const PORTS = [3456, 3457, 3458, 3459, 3460];
    let ws = null;
    let reconnectTimer = null;
    let keepaliveTimer = null;
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');

    function setStatus(text, state) {
      statusEl.textContent = text;
      dotEl.className = 'dot ' + state;
    }

    // Try all ports in parallel, use first successful connection
    function connectParallel() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      setStatus('Looking for local daemon…', 'connecting');
      let connected = false;
      const attempts = [];

      PORTS.forEach(port => {
        const url = `ws://127.0.0.1:${port}/plugin`;
        try {
          const socket = new WebSocket(url);
          attempts.push(socket);

          socket.onopen = () => {
            if (connected) {
              socket.close();
              return;
            }
            connected = true;
            ws = socket;

            // Close other attempts (silently, no handlers)
            attempts.forEach(s => {
              if (s !== socket) {
                s.onclose = null;  // Prevent triggering reconnect
                s.onerror = null;
                try { s.close(); } catch {}
              }
            });

            // NOW set handlers on winning socket only
            ws.onmessage = handleMessage;
            ws.onclose = handleClose;
            ws.onerror = handleClose;

            setStatus('Connected to local bridge', 'connected');
            parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');

            // Send hello
            ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '1.3.0' }));

            // Start keepalive (ping every 10s)
            startKeepalive();
          };

          // During scan: ignore close/error (don't trigger reconnect)
          socket.onclose = () => {};
          socket.onerror = () => {};
        } catch (e) {}
      });

      // If no connection after 1.5s, retry (faster than 3s)
      setTimeout(() => {
        if (!connected) {
          attempts.forEach(s => {
            s.onclose = null;
            try { s.close(); } catch {}
          });
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectParallel, 300);
        }
      }, 1500);
    }

    function handleMessage(event) {
      try {
        const msg = JSON.parse(event.data);

        if (msg.action === 'eval') {
          parent.postMessage({
            pluginMessage: { type: 'eval', id: msg.id, code: msg.code }
          }, '*');
        }

        // Batch eval support
        if (msg.action === 'eval-batch') {
          parent.postMessage({
            pluginMessage: { type: 'eval-batch', id: msg.id, codes: msg.codes }
          }, '*');
        }

        // Daemon pings us
        if (msg.action === 'ping') {
          ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
        }

        // Daemon responds to our ping
        if (msg.type === 'pong') {
          lastPong = Date.now();
        }
      } catch (e) {
        console.error('Message parse error:', e);
      }
    }

    function handleClose() {
      // Only show reconnecting if we were the active connection
      if (ws && ws.readyState !== WebSocket.OPEN) {
        ws = null;
        setStatus('Connection lost, retrying…', 'connecting');
        stopKeepalive();
        parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');

        // Fast reconnect (200ms)
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectParallel, 200);
      }
    }

    let lastPong = Date.now();

    function startKeepalive() {
      stopKeepalive();
      lastPong = Date.now();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          // Check if we got a pong recently (within 8s for faster detection)
          if (Date.now() - lastPong > 8000) {
            console.log('No pong received, reconnecting...');
            ws.close();
            return;
          }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 3000);  // Ping every 3s for faster dead connection detection
    }

    function stopKeepalive() {
      if (keepaliveTimer) {
        clearInterval(keepaliveTimer);
        keepaliveTimer = null;
      }
    }

    // Legacy function name for compatibility
    function connect() { connectParallel(); }

    // Receive results from plugin main thread
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'result') {
        // Send result back to CLI via WebSocket
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'result',
            id: msg.id,
            result: msg.result,
            error: msg.error
          }));
        }
      }

      // Batch result forwarding (CRITICAL for render-batch stability)
      if (msg.type === 'batch-result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'batch-result',
            id: msg.id,
            results: msg.results
          }));
        }
      }
    };

    // Start connection
    connect();
  </script>
</body>
</html>
